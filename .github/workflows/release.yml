name: release

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) and this builds the
# receiver for Linux, Windows and macOS, then publishes the binaries + one-line
# installers to a GitHub Release. No manual building.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: relay-desktop-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: relay-desktop-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: relay-desktop-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            name: relay-desktop-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin=target/${{ matrix.target }}/release/relay-desktop
          tar -C "$(dirname "$bin")" -czf "${{ matrix.name }}.tar.gz" relay-desktop
          shasum -a 256 "${{ matrix.name }}.tar.gz" > "${{ matrix.name }}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/relay-desktop.exe"
          Compress-Archive -Path $bin -DestinationPath "${{ matrix.name }}.zip" -Force
          (Get-FileHash "${{ matrix.name }}.zip" -Algorithm SHA256).Hash.ToLower() | Out-File "${{ matrix.name }}.zip.sha256" -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage install scripts
        run: |
          cp install/install.sh dist/install.sh
          cp install/install.ps1 dist/install.ps1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body_path: install/RELEASE_NOTES.md
          fail_on_unmatched_files: false
